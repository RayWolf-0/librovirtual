services:
  usuarios:
    build: ./usuarios
    volumes:
      - ./Wallet_libro:/app/wallet 
    environment:
      - TNS_ADMIN=/app/wallet
    ports:
      - "8081:8080"
  
  calificaciones:
    build: ./calificaciones
    volumes:
      - ./Wallet_libro:/app/wallet
    environment:
      - TNS_ADMIN=/app/wallet
    ports:
      - "8082:8080"
  
  asistencia:
    build: ./asistencia
    volumes:
      - ./Wallet_libro:/app/wallet
    environment:
      - TNS_ADMIN=/app/wallet
    ports:
      - "8083:8080"